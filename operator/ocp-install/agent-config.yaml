      interfaces:
        - name: ens192
          type: ethernet
          state: up
          mac-address: "<MASTER2_MAC>"
          ipv4:
            enabled: true
            dhcp: false
            address:
              - ip: <MASTER2_IP>
                prefix-length: <PREFIX_LENGTH>
          ipv6:
            enabled: false
      dns-resolver:
        config:
          server:
            - <DNS_SERVER_IP>
